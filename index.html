<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My MySpace Profile</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #d1cfcf; }
        header { background: #4b8bc5; padding: 10px; text-align: center; color: white; }
        nav { margin: 20px 0; }
        nav a { margin: 0 15px; color: #fff; text-decoration: none; }
        section { margin: 20px; padding: 20px; background: white; border-radius: 5px; }
        .profile-box { background: #f9f9f9; padding: 10px; margin: 10px; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <header>
        <h1>Welcome to My MySpace Profile</h1>
        <nav>
            <a href="#home">Home</a>
            <a href="#updates">Latest Updates</a>
            <a href="#contact">Contact</a>
            <a href="#blog">Blog</a>
        </nav>
    </header>

    <section id="profile">
        <h2>Profile</h2>
        <div class="profile-box">Profile Info 1</div>
        <div class="profile-box">Profile Info 2</div>
    </section>

    <section id="contact">
        <h2>Contact Information</h2>
        <p>Email: youremail@example.com</p>
        <p>Phone: 123-456-7890</p>
    </section>

    <section id="updates">
        <h2>Latest Updates</h2>
        <p>Update 1</p>
        <p>Update 2</p>
    </section>

    <section id="interests">
        <h2>Interests</h2>
        <p>Interest 1</p>
        <p>Interest 2</p>
    </section>

    <section id="blog">
        <h2>Blog Entries</h2>
        <p>Blog Entry 1</p>
        <p>Blog Entry 2</p>
    </section>
</body>
</html>
